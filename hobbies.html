            left: 16px;

            font-size: 0.74rem;
            font-weight: 500;

            text-transform: uppercase;
            text-decoration: none;
            z-index: 1001;
            transition: top 0.2s ease;

        .skip-link:focus { top: 12px; }

        /* Scroll progress bar */

            top: 0; left: 0;
            height: 2px;
            width: 0;
            background: var(--ink);
            z-index: 1002;
            transition: width 0.08s ease-out;
            pointer-events: none;
        }

        /* Visible keyboard focus rings */

        :focus-visible {

        #main:focus,

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {

                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;

        #wrapper {

<script>
    // Shuffle the photo gallery order on every page load
    (function shuffleGallery() {
        const grid = document.getElementById('galleryGrid');
        if (!grid) return;
        const items = Array.from(grid.children);
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const frag = document.createDocumentFragment();
        items.forEach((el) => frag.appendChild(el));
        grid.appendChild(frag);
    })();

    // Scroll progress bar
    (function scrollProgress() {
        const bar = document.getElementById('scrollProgress');
        if (!bar) return;
        const update = () => {
            const h = document.documentElement;
            const max = h.scrollHeight - h.clientHeight;
            const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
            bar.style.width = pct + '%';
        };
        window.addEventListener('scroll', update, { passive: true });
        window.addEventListener('resize', update);
        update();
    })();

    // Lightbox with slideshow (← → keys + on-screen arrows)
    const lb = document.getElementById('lb');
    const lbImg = lb ? lb.querySelector('img') : null;
    let lbImages = [];
    let lbIndex = 0;

    function refreshLbImages() {
        lbImages = Array.from(document.querySelectorAll('.image.fit img'));
    }
    function showLbAt(i) {
        if (!lbImages.length) return;
        lbIndex = ((i % lbImages.length) + lbImages.length) % lbImages.length;
        lbImg.src = lbImages[lbIndex].src;
        lb.classList.add('show');
    }
    function closeLb() {
        if (!lb) return;
        lb.classList.remove('show');
        lbImg.src = '';
    }

    if (lb && lbImg) {
        document.addEventListener('click', (e) => {
            if (e.target.closest('.lb-prev')) { showLbAt(lbIndex - 1); return; }
            if (e.target.closest('.lb-next')) { showLbAt(lbIndex + 1); return; }
            if (e.target.closest('.lb-close')) { closeLb(); return; }
            const img = e.target.closest('.image.fit img');
            if (img) {
                refreshLbImages();
                const idx = lbImages.indexOf(img);
                showLbAt(idx === -1 ? 0 : idx);
            } else if (e.target === lb) {
                closeLb();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (!lb.classList.contains('show')) return;
            if (e.key === 'Escape') closeLb();
            else if (e.key === 'ArrowLeft') showLbAt(lbIndex - 1);
            else if (e.key === 'ArrowRight') showLbAt(lbIndex + 1);
        });
    }
</script>
