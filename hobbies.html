<!DOCTYPE HTML>
<html>
<head>
    <title>Hobbies — Yuyang Wang</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0a;
            --ink-soft: #1a1a1a;
            --paper: #ffffff;
            --muted: #6b6b6b;
            --hairline: #e6e6e6;
            --serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: var(--sans);
            font-weight: 400;
            line-height: 1.7;
            color: var(--ink);
            background: var(--paper);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: var(--ink); color: var(--paper); }

        #wrapper {
            max-width: 1180px;
            margin: 0 auto;
            background: var(--paper);
        }

        #header {
            background: var(--paper);
            color: var(--ink);
            text-align: center;
            padding: 110px 0 90px;
            border-bottom: 1px solid var(--hairline);
        }
        #header h1 {
            margin: 0;
            font-family: var(--serif);
            font-weight: 500;
            font-size: 4.4rem;
            letter-spacing: 0.04em;
            line-height: 1.1;
        }
        #header h1::after {
            content: "";
            display: block;
            width: 56px;
            height: 1px;
            background: var(--ink);
            margin: 28px auto 0;
        }

        #nav {
            background: var(--paper);
            border-bottom: 1px solid var(--hairline);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav {
            max-width: 1180px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
        }
        .links { display: flex; list-style: none; gap: 4px; margin: 0; padding: 0; }
        .links a {
            display: block;
            padding: 22px 22px;
            text-decoration: none;
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            position: relative;
            transition: opacity 0.25s ease;
        }
        .links a::after {
            content: "";
            position: absolute;
            left: 22px;
            right: 22px;
            bottom: 16px;
            height: 1px;
            background: var(--ink);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.35s ease;
        }
        .links a:hover::after,
        .links .active a::after { transform: scaleX(1); }

        #main {
            padding: 0 56px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            max-width: 1000px;
            width: 100%;
            background: var(--paper);
            border: none;
            border-bottom: 1px solid var(--hairline);
            border-radius: 0;
            padding: 60px 0;
            margin-top: 0;
            box-shadow: none;
        }
        section:last-of-type { border-bottom: none; }

        .row { display: flex; flex-wrap: wrap; justify-content: center; margin: 0 -14px; }
        [class*="col-"] { padding: 0 14px; }
        .col-6 { flex: 0 0 50%; max-width: 50%; }
        .col-12 { flex: 0 0 100%; max-width: 100%; }
        .col-3 { flex: 0 0 25%; max-width: 25%; }

        @media (max-width: 768px) {
            .col-6, .col-3 { flex: 0 0 50%; max-width: 50%; }
            #header { padding: 70px 20px 60px; }
            #header h1 { font-size: 2.6rem; }
            #main { padding: 0 24px 50px; }
            section { padding: 40px 0; }
            .links a { padding: 14px 10px; font-size: 0.72rem; letter-spacing: 0.12em; }
            .links a::after { left: 10px; right: 10px; bottom: 6px; }
        }

        .image.fit img {
            width: 100%;
            height: auto;
            border-radius: 0;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            display: block;
        }
        .image.fit img:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }

        #main section:first-of-type .image.fit img {
            height: 380px;
            object-fit: cover;
        }

        .gallery .image.fit img {
            height: 220px;
            object-fit: cover;
            border-radius: 0;
            border: 1px solid var(--hairline);
            background: var(--paper);
            padding: 6px;
        }

        h2 {
            font-family: var(--serif);
            font-size: 2.1rem;
            font-weight: 500;
            margin: 0 0 28px;
            text-align: center;
            letter-spacing: 0.005em;
        }
        h2::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            background: var(--ink);
            margin: 16px auto 0;
        }

        p {
            margin: 0 0 16px;
            text-align: center;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            color: var(--ink-soft);
            font-size: 1.02rem;
            line-height: 1.75;
        }

        .row p {
            text-align: left;
            margin: 0;
            padding: 0 8px;
        }

        footer {
            background: var(--paper);
            color: var(--muted);
            text-align: center;
            padding: 28px;
            border-top: 1px solid var(--hairline);
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div id="wrapper">
    <div id="nav">
        <div class="nav">
            <ul class="links">
                <li><a href="index.html">Home</a></li>
                <li><a href="CV/YuyangWang_CV.pdf" target="_blank" rel="noopener">CV</a></li>
                <li class="active"><a href="hobbies.html">Hobbies</a></li>
            </ul>
        </div>
    </div>

    <header id="header"><h1>Hobbies</h1></header>

    <div id="main">
        <section>
            <h2>Guitar &amp; Photography</h2>
            <p>I like to play fingerstyle guitar and do photography.</p>
            <div class="row" style="margin-top: 24px;">
                <div class="col-6">
                    <a class="image fit"><img src="Hobby/Guitar.jpg" alt="Playing fingerstyle guitar"></a>
                </div>
                <div class="col-6" style="display:flex;align-items:center;">
                    <p>Fingerstyle lets me arrange melody, bass, and percussive hits on one guitar. Photography helps me slow down and notice details in everyday scenes.</p>
                </div>
            </div>
        </section>

        <section>
            <h2>Photo Gallery</h2>
            <div class="row gallery" style="margin-top:18px">
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo1.jpg" alt="Photograph 1"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo2.jpg" alt="Photograph 2"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo3.jpg" alt="Photograph 3"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo4.jpg" alt="Photograph 4"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo10.jpg" alt="Photograph 10"></a></div>
            </div>
            <div class="row gallery" style="margin-top:14px">
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo5.jpg" alt="Photograph 5"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo6.jpg" alt="Photograph 6"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo7.jpg" alt="Photograph 7"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo8.jpg" alt="Photograph 8"></a></div>
                <div class="col-3"><a class="image fit"><img src="Hobby/Photo9.jpg" alt="Photograph 9"></a></div>
            </div>
        </section>
    </div>

    <footer>&copy; Yuyang Wang</footer>
</div>
</body>
</html>
