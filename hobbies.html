<!DOCTYPE HTML>
<html>
<head>
    <title>Hobbies — Yuyang Wang</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0a0a0a;
            --ink-soft: #1a1a1a;
            --paper: #ffffff;
            --muted: #6b6b6b;
            --hairline: #e6e6e6;
            --serif: "Cormorant Garamond", Georgia, "Times New Roman", serif;
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: var(--sans);
            font-weight: 400;
            line-height: 1.7;
            color: var(--ink);
            background: var(--paper);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: var(--ink); color: var(--paper); }

        #wrapper {
            max-width: 1180px;
            margin: 0 auto;
            background: var(--paper);
        }

        #header {
            background: var(--paper);
            color: var(--ink);
            text-align: center;
            padding: 110px 0 90px;
            border-bottom: 1px solid var(--hairline);
        }
        #header h1 {
            margin: 0;
            font-family: var(--serif);
            font-weight: 500;
            font-size: 4.4rem;
            letter-spacing: 0.04em;
            line-height: 1.1;
        }
        #header h1::after {
            content: "";
            display: block;
            width: 56px;
            height: 1px;
            background: var(--ink);
            margin: 28px auto 0;
        }

        #nav {
            background: var(--paper);
            border-bottom: 1px solid var(--hairline);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav {
            max-width: 1180px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
        }
        .links { display: flex; list-style: none; gap: 4px; margin: 0; padding: 0; }
        .links a {
            display: block;
            padding: 22px 22px;
            text-decoration: none;
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            position: relative;
            transition: opacity 0.25s ease;
        }
        .links a::after {
            content: "";
            position: absolute;
            left: 22px;
            right: 22px;
            bottom: 16px;
            height: 1px;
            background: var(--ink);
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.35s ease;
        }
        .links a:hover::after,
        .links .active a::after { transform: scaleX(1); }

        #main {
            padding: 0 56px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            max-width: 1000px;
            width: 100%;
            background: var(--paper);
            border: none;
            border-bottom: 1px solid var(--hairline);
            border-radius: 0;
            padding: 60px 0;
            margin-top: 0;
            box-shadow: none;
        }
        section:last-of-type { border-bottom: none; }

        .row { display: flex; flex-wrap: wrap; justify-content: center; margin: 0 -14px; }
        [class*="col-"] { padding: 0 14px; }
        .col-6 { flex: 0 0 50%; max-width: 50%; }
        .col-12 { flex: 0 0 100%; max-width: 100%; }
        .col-3 { flex: 0 0 25%; max-width: 25%; }

        @media (max-width: 768px) {
            .col-6, .col-3 { flex: 0 0 50%; max-width: 50%; }
            #header { padding: 70px 20px 60px; }
            #header h1 { font-size: 2.6rem; }
            #main { padding: 0 24px 50px; }
            section { padding: 40px 0; }
            .links a { padding: 14px 10px; font-size: 0.72rem; letter-spacing: 0.12em; }
            .links a::after { left: 10px; right: 10px; bottom: 6px; }
        }

        .image.fit img {
            width: 100%;
            height: auto;
            border-radius: 0;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            display: block;
            cursor: zoom-in;
        }
        .image.fit img:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }

        #main section:first-of-type .image.fit img {
            height: 380px;
            object-fit: cover;
        }

        /* Photo grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-top: 20px;
        }
        .gallery-grid .image.fit { display: block; }
        .gallery-grid .image.fit img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border: 1px solid var(--hairline);
            background: var(--paper);
            padding: 6px;
        }
        @media (max-width: 1024px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
            .gallery-grid .image.fit img { height: 220px; }
        }
        @media (max-width: 640px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .gallery-grid .image.fit img { height: 180px; padding: 4px; }
        }

        /* Lightbox */
        .lightbox { position: fixed; inset: 0; background: rgba(10,10,10,.92); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .lightbox img { max-width: 92vw; max-height: 92vh; }
        .lightbox.show { display: flex; }
        .lightbox:focus { outline: none; }

        h2 {
            font-family: var(--serif);
            font-size: 2.1rem;
            font-weight: 500;
            margin: 0 0 28px;
            text-align: center;
            letter-spacing: 0.005em;
        }
        h2::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            background: var(--ink);
            margin: 16px auto 0;
        }

        p {
            margin: 0 0 16px;
            text-align: center;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            color: var(--ink-soft);
            font-size: 1.02rem;
            line-height: 1.75;
        }

        .row p {
            text-align: left;
            margin: 0;
            padding: 0 8px;
        }

        footer {
            background: var(--paper);
            color: var(--muted);
            text-align: center;
            padding: 28px;
            border-top: 1px solid var(--hairline);
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
    </style>
</head>

<script>
    // Shuffle the photo gallery order on every page load
    (function shuffleGallery() {
        const grid = document.getElementById('galleryGrid');
        if (!grid) return;
        const items = Array.from(grid.children);
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const frag = document.createDocumentFragment();
        items.forEach((el) => frag.appendChild(el));
        grid.appendChild(frag);
    })();

    // Lightbox: click any photo to enlarge
    const lb = document.getElementById('lb');
    const lbImg = lb ? lb.querySelector('img') : null;
    if (lb && lbImg) {
        document.addEventListener('click', (e) => {
            const img = e.target.closest('.image.fit img');
            if (img) {
                lbImg.src = img.src;
                lb.classList.add('show');
            } else if (e.target === lb) {
                lb.classList.remove('show');
                lbImg.src = '';
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') lb.classList.remove('show');
        });
    }
</script>
